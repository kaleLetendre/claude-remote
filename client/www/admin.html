<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Remote — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0b0c10; --bg-1: #12131a; --bg-2: #1a1c26; --bg-3: #222433; --bg-4: #2a2d40;
      --border-0: #1e2030; --border-1: #2d3048; --border-2: #3d415c;
      --text-0: #e4e6f0; --text-1: #b0b4c8; --text-2: #7a7f9a; --text-3: #4e526a;
      --green: #4ae08c; --green-bg: rgba(74,224,140,0.08); --green-border: rgba(74,224,140,0.2);
      --amber: #f0c050; --red: #f06070; --red-bg: rgba(240,96,112,0.08);
      --blue: #60a0f0; --accent: #a080f0; --accent-bg: rgba(160,128,240,0.08); --accent-border: rgba(160,128,240,0.25);
      --font-ui: 'Outfit', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', 'Menlo', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg-0); color: var(--text-0); font-family: var(--font-ui); font-size: 15px; -webkit-font-smoothing: antialiased; }
    body { overflow-y: auto; padding: 24px; }

    .container { max-width: 720px; margin: 0 auto; }

    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border-1); }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .badge { font-size: 12px; font-family: var(--font-mono); background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); padding: 2px 10px; border-radius: 12px; }
    .header .badge.offline { background: var(--red-bg); color: var(--red); border-color: var(--red); }

    .card { background: var(--bg-1); border: 1px solid var(--border-0); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2); margin-bottom: 14px; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .stat { background: var(--bg-2); border-radius: 8px; padding: 12px; }
    .stat-label { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .stat-value { font-family: var(--font-mono); font-size: 14px; color: var(--text-0); word-break: break-all; }

    .token-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .token-display { flex: 1; font-family: var(--font-mono); font-size: 13px; background: var(--bg-2); border: 1px solid var(--border-1); border-radius: 6px; padding: 10px 12px; color: var(--text-1); user-select: all; overflow-x: auto; white-space: nowrap; }

    .btn { font-family: var(--font-ui); font-size: 13px; font-weight: 600; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border-1); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .field-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 6px; margin-top: 12px; }
    .field-input { width: 100%; font-family: var(--font-mono); font-size: 14px; background: var(--bg-2); border: 1px solid var(--border-1); border-radius: 6px; padding: 10px 12px; color: var(--text-0); outline: none; }
    .field-input:focus { border-color: var(--accent); }

    .password-form { display: flex; gap: 8px; align-items: flex-end; margin-top: 4px; }
    .password-form .field-input { flex: 1; }

    .msg { font-size: 13px; margin-top: 8px; }
    .msg.ok { color: var(--green); }
    .msg.err { color: var(--red); }

    .client-list { margin-top: 8px; }
    .client-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg-2); border-radius: 6px; margin-bottom: 6px; font-family: var(--font-mono); font-size: 13px; }
    .client-row .ip { color: var(--text-0); }
    .client-row .meta { color: var(--text-3); font-size: 12px; }

    .session-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--bg-2); border-radius: 6px; margin-bottom: 6px; gap: 8px; }
    .session-info { flex: 1; min-width: 0; }
    .session-name { font-weight: 600; font-size: 14px; }
    .session-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .session-status { font-family: var(--font-mono); font-size: 12px; padding: 2px 8px; border-radius: 10px; }
    .btn-open { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-ui); white-space: nowrap; }
    .btn-open:hover { background: var(--accent); color: #fff; }
    .session-status.working { background: var(--green-bg); color: var(--green); }
    .session-status.idle { background: var(--bg-3); color: var(--text-2); }
    .session-status.waiting { background: rgba(240,192,80,0.1); color: var(--amber); }
    .session-status.dead { background: var(--red-bg); color: var(--red); }
    .session-status.done { background: var(--bg-3); color: var(--text-3); }

    .controls { display: flex; gap: 8px; flex-wrap: wrap; }

    .empty { color: var(--text-3); font-size: 13px; font-style: italic; padding: 8px 0; }

    /* Auth screen */
    .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
    .auth-screen h2 { font-size: 20px; margin-bottom: 8px; }
    .auth-screen p { color: var(--text-2); margin-bottom: 24px; }
    .auth-screen .form { width: 100%; max-width: 340px; text-align: left; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    const app = document.getElementById('app');
    let token = new URLSearchParams(location.search).get('token') || localStorage.getItem('admin-token') || '';
    let refreshTimer = null;

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return Math.floor(diff / 86400000) + 'd ago';
    }

    function formatUptime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m ${Math.floor(s % 60)}s`;
    }

    async function api(path, opts = {}) {
      const res = await fetch(`/api${path}?token=${token}`, {
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      return res;
    }

    // ── Auth screen ──
    function showAuth(error) {
      clearInterval(refreshTimer);
      app.innerHTML = `
        <div class="auth-screen">
          <div style="font-size:48px;opacity:0.3;margin-bottom:16px;">&#x2318;</div>
          <h2>Claude Remote Admin</h2>
          <p>Enter your password or token to access the admin panel.</p>
          <div class="form">
            <label class="field-label">Password</label>
            <input type="password" class="field-input" id="auth-password" placeholder="Enter password">
            <details style="margin-top:12px;">
              <summary style="cursor:pointer;font-size:13px;color:var(--text-2);">Use token instead</summary>
              <label class="field-label">Token</label>
              <input type="text" class="field-input" id="auth-token" placeholder="abc123...">
            </details>
            <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:12px;" id="auth-go">Sign In</button>
            ${error ? `<p class="msg err" style="margin-top:8px;">${error}</p>` : ''}
          </div>
        </div>
      `;
      document.getElementById('auth-go').onclick = async () => {
        const pw = document.getElementById('auth-password').value.trim();
        const tk = document.getElementById('auth-token')?.value?.trim();
        if (tk) {
          token = tk;
          localStorage.setItem('admin-token', token);
          loadAdmin();
        } else if (pw) {
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ password: pw }),
            });
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Login failed'); }
            const data = await res.json();
            token = data.token;
            localStorage.setItem('admin-token', token);
            loadAdmin();
          } catch (e) {
            showAuth(e.message);
          }
        }
      };
      document.getElementById('auth-password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('auth-go').click();
      });
    }

    // ── Admin panel ──
    async function loadAdmin() {
      try {
        const res = await api('/admin/status');
        if (!res.ok) { showAuth('Session expired'); return; }
        const data = await res.json();
        renderAdmin(data);
        clearInterval(refreshTimer);
        refreshTimer = setInterval(() => refreshStatus(), 5000);
      } catch {
        showAuth('Cannot reach server');
      }
    }

    async function refreshStatus() {
      // Don't refresh while user is typing
      if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
      try {
        const res = await api('/admin/status');
        if (!res.ok) return;
        const d = await res.json();
        // Update only dynamic parts — don't touch form inputs
        const el = (id) => document.getElementById(id);
        if (el('stat-uptime')) el('stat-uptime').textContent = formatUptime(d.uptime);
        if (el('stat-clients')) el('stat-clients').textContent = d.clients?.length || 0;
        if (el('client-list')) {
          el('client-list').innerHTML = (d.clients && d.clients.length) ? d.clients.map(c => `
            <div class="client-row">
              <span class="ip">${c.ip}</span>
              <span class="meta">connected ${timeAgo(c.connectedAt)}${c.subscribedSession ? ' &middot; watching session' : ''}</span>
            </div>
          `).join('') : '<div class="empty">No clients connected</div>';
          el('client-count').textContent = d.clients?.length || 0;
        }
        if (el('session-list')) {
          el('session-list').innerHTML = (d.sessions && d.sessions.length) ? d.sessions.map(s => renderSessionRow(s)).join('') : '<div class="empty">No active sessions</div>';
          el('session-count').textContent = d.sessions?.length || 0;
          wireOpenButtons();
        }
        if (el('pw-status')) {
          el('pw-status').innerHTML = d.passwordSet ? '<span style="color:var(--green);">(set)</span>' : '<span style="color:var(--text-3);">(not set)</span>';
        }
      } catch {}
    }

    function renderAdmin(d) {
      const ver = d.version?.version || '?';
      app.innerHTML = `
        <div class="header">
          <h1>&#x2318; Claude Remote</h1>
          <span class="badge">v${ver} &middot; online</span>
        </div>

        <!-- Status -->
        <div class="card">
          <h2>Server Status</h2>
          <div class="stat-grid">
            <div class="stat"><div class="stat-label">Hostname</div><div class="stat-value">${d.hostname}</div></div>
            <div class="stat"><div class="stat-label">Uptime</div><div class="stat-value" id="stat-uptime">${formatUptime(d.uptime)}</div></div>
            <div class="stat"><div class="stat-label">Port</div><div class="stat-value">${d.port}</div></div>
            <div class="stat"><div class="stat-label">LAN IP</div><div class="stat-value">${d.ips?.lanIp || 'unknown'}</div></div>
            <div class="stat"><div class="stat-label">Tailscale IP</div><div class="stat-value">${d.ips?.tailscaleIp || 'not detected'}</div></div>
            <div class="stat"><div class="stat-label">Clients</div><div class="stat-value" id="stat-clients">${d.clients?.length || 0}</div></div>
          </div>
        </div>

        <!-- Auth -->
        <div class="card">
          <h2>Authentication</h2>
          <label class="field-label" style="margin-top:0;">Auth Token</label>
          <div class="token-row">
            <div class="token-display" id="token-display">${token}</div>
            <button class="btn btn-secondary btn-sm" id="copy-token">Copy</button>
          </div>
          <label class="field-label">Password <span id="pw-status">${d.passwordSet ? '<span style="color:var(--green);">(set)</span>' : '<span style="color:var(--text-3);">(not set)</span>'}</span></label>
          <div class="password-form">
            <input type="password" class="field-input" id="new-password" placeholder="${d.passwordSet ? 'Change password...' : 'Set a password...'}">
            <button class="btn btn-primary btn-sm" id="set-password">Set</button>
            ${d.passwordSet ? '<button class="btn btn-danger btn-sm" id="remove-password">Remove</button>' : ''}
          </div>
          <p class="msg" id="pw-msg"></p>
        </div>

        <!-- Whisper (Server-side STT) -->
        <div class="card" id="whisper-card">
          <h2>Whisper (Server STT)</h2>
          <div id="whisper-body"><div class="empty">Loading…</div></div>
        </div>

        <!-- Kokoro (Server-side TTS) -->
        <div class="card" id="tts-card">
          <h2>Kokoro (Server TTS)</h2>
          <div id="tts-body"><div class="empty">Loading…</div></div>
        </div>

        <!-- Connected Clients -->
        <div class="card">
          <h2>Connected Clients (<span id="client-count">${d.clients?.length || 0}</span>)</h2>
          <div class="client-list" id="client-list">
            ${(d.clients && d.clients.length) ? d.clients.map(c => `
              <div class="client-row">
                <span class="ip">${c.ip}</span>
                <span class="meta">connected ${timeAgo(c.connectedAt)}${c.subscribedSession ? ' &middot; watching session' : ''}</span>
              </div>
            `).join('') : '<div class="empty">No clients connected</div>'}
          </div>
        </div>

        <!-- Sessions -->
        <div class="card">
          <h2>Sessions (<span id="session-count">${d.sessions?.length || 0}</span>)</h2>
          <div id="session-list">${(d.sessions && d.sessions.length) ? d.sessions.map(s => renderSessionRow(s)).join('') : '<div class="empty">No active sessions</div>'}</div>
        </div>

        <!-- Controls -->
        <div class="card">
          <h2>Controls</h2>
          <div class="controls">
            <button class="btn btn-secondary" id="btn-restart">Restart Server</button>
            <button class="btn btn-secondary" id="btn-check-update">Check for Updates</button>
            <button class="btn btn-secondary" id="btn-reload-ui">Hard Reload UI</button>
          </div>
          <p class="msg" id="ctrl-msg"></p>
        </div>
      `;

      // Wire up buttons
      document.getElementById('copy-token').onclick = () => {
        navigator.clipboard.writeText(token).then(() => {
          document.getElementById('copy-token').textContent = 'Copied!';
          setTimeout(() => document.getElementById('copy-token').textContent = 'Copy', 1500);
        });
      };

      document.getElementById('set-password').onclick = async () => {
        const pw = document.getElementById('new-password').value;
        const msg = document.getElementById('pw-msg');
        if (!pw) { msg.className = 'msg err'; msg.textContent = 'Enter a password'; return; }
        try {
          const res = await api('/admin/password', { method: 'POST', body: JSON.stringify({ password: pw }) });
          if (!res.ok) throw new Error((await res.json()).error);
          msg.className = 'msg ok'; msg.textContent = 'Password set successfully';
          document.getElementById('new-password').value = '';
          setTimeout(() => refreshStatus(), 500);
        } catch (e) { msg.className = 'msg err'; msg.textContent = e.message; }
      };

      const removeBtn = document.getElementById('remove-password');
      if (removeBtn) {
        removeBtn.onclick = async () => {
          const msg = document.getElementById('pw-msg');
          try {
            const res = await api('/admin/password', { method: 'DELETE' });
            if (!res.ok) throw new Error((await res.json()).error);
            msg.className = 'msg ok'; msg.textContent = 'Password removed';
            setTimeout(() => refreshStatus(), 500);
          } catch (e) { msg.className = 'msg err'; msg.textContent = e.message; }
        };
      }

      document.getElementById('btn-restart').onclick = async () => {
        const msg = document.getElementById('ctrl-msg');
        if (!confirm('Restart the server?')) return;
        try {
          await api('/restart', { method: 'POST' });
          msg.className = 'msg ok'; msg.textContent = 'Server restarting...';
        } catch (e) { msg.className = 'msg err'; msg.textContent = e.message; }
      };

      document.getElementById('btn-reload-ui').onclick = () => {
        // Append a cache-buster and reload so even aggressive webview caching is bypassed.
        const u = new URL(location.href);
        u.searchParams.set('t', String(Date.now()));
        location.replace(u.toString());
      };

      document.getElementById('btn-check-update').onclick = async () => {
        const msg = document.getElementById('ctrl-msg');
        try {
          const res = await api('/update/check', { method: 'POST' });
          const data = await res.json();
          msg.className = 'msg ok';
          msg.textContent = data.updateAvailable ? `Update available: ${data.details?.version}` : 'Already up to date';
        } catch (e) { msg.className = 'msg err'; msg.textContent = e.message; }
      };

      wireOpenButtons();

      // Load Whisper + TTS panels
      refreshWhisperPanel();
      refreshTtsPanel();
    }

    // ── Whisper admin panel ──────────────────────────────────
    async function refreshWhisperPanel() {
      const body = document.getElementById('whisper-body');
      if (!body) return;
      try {
        const res = await api('/admin/whisper/status');
        const w = await res.json();
        body.innerHTML = renderWhisperBody(w);
        wireWhisperHandlers(w);
      } catch (e) {
        body.innerHTML = `<div class="msg err">Failed to load: ${e.message}</div>`;
      }
    }

    function fmtBytes(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
      return (n / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    function renderWhisperBody(w) {
      const badge = (ok, label) => `<span class="stat-value" style="color:${ok ? 'var(--green)' : 'var(--red)'}">${ok ? '✓' : '✗'} ${label}</span>`;
      const running = w.running
        ? `<span style="color:var(--green);font-family:var(--font-mono);font-size:13px">running: model=${w.currentConfig?.model} device=${w.currentConfig?.device}</span>`
        : `<span style="color:var(--text-3);font-family:var(--font-mono);font-size:13px">not running</span>`;

      const installed = w.installedModels.length
        ? w.installedModels.map(m => `
            <div class="session-row">
              <div class="session-info">
                <div class="session-name">${m.name}</div>
                <div style="font-size:12px;color:var(--text-3);font-family:var(--font-mono)">${fmtBytes(m.sizeBytes)}</div>
              </div>
              <div class="session-right">
                <button class="btn btn-danger btn-sm" data-delete-model="${m.name}">Delete</button>
              </div>
            </div>`).join('')
        : '<div class="empty">No models installed</div>';

      const missingModelsList = w.knownModels.filter(m => !w.installedModels.some(x => x.name === m));

      const modelOptions = w.installedModels.map(m =>
        `<option value="${m.name}"${m.name === w.model ? ' selected' : ''}>${m.name}</option>`
      ).join('');

      const deviceOptions = `
        <label style="margin-right:12px;color:var(--text-1);font-size:13px">
          <input type="radio" name="whisper-device" value="auto" ${w.device === 'auto' ? 'checked' : ''}> auto
        </label>
        <label style="margin-right:12px;color:var(--text-1);font-size:13px">
          <input type="radio" name="whisper-device" value="cpu" ${w.device === 'cpu' ? 'checked' : ''}> CPU
        </label>
        <label style="color:${w.cudaAvailable ? 'var(--text-1)' : 'var(--text-3)'};font-size:13px">
          <input type="radio" name="whisper-device" value="cuda" ${w.device === 'cuda' ? 'checked' : ''} ${w.cudaAvailable ? '' : 'disabled'}>
          GPU (CUDA)${w.cudaAvailable ? '' : ' — not detected'}
        </label>`;

      const bootstrapSection = w.fasterWhisperInstalled
        ? `<div class="msg ok">faster-whisper ready</div>`
        : `<div class="stat" style="margin-top:8px">
             <div class="stat-label">Setup required</div>
             <div style="font-size:13px;color:var(--text-1);margin-bottom:8px">
               ${!w.pythonAvailable ? '<span style="color:var(--red)">Python 3 not found on PATH.</span><br>Install python3 on the server host, then reload this page.' : 'Install faster-whisper into a managed venv under data/whisper-venv. Takes a minute.'}
             </div>
             <button class="btn btn-primary btn-sm" id="whisper-bootstrap-btn" ${w.pythonAvailable ? '' : 'disabled'}>Install Whisper dependencies</button>
             <pre id="whisper-bootstrap-log" style="display:none;margin-top:8px;padding:8px;background:var(--bg-2);border-radius:6px;max-height:200px;overflow:auto;font-size:11px;color:var(--text-1);font-family:var(--font-mono)"></pre>
           </div>`;

      return `
        <div class="stat-grid" style="margin-bottom:12px">
          <div class="stat"><div class="stat-label">Python 3</div><div class="stat-value">${w.pythonAvailable ? '<span style="color:var(--green)">✓ available</span>' : '<span style="color:var(--red)">✗ not found</span>'}</div></div>
          <div class="stat"><div class="stat-label">CUDA</div><div class="stat-value">${w.cudaAvailable ? '<span style="color:var(--green)">✓ detected</span>' : '<span style="color:var(--text-3)">not detected</span>'}</div></div>
          <div class="stat"><div class="stat-label">ffmpeg</div><div class="stat-value">${w.ffmpegAvailable ? '<span style="color:var(--green)">✓ available</span>' : '<span style="color:var(--amber)">not found (needed for audio decode)</span>'}</div></div>
          <div class="stat"><div class="stat-label">faster-whisper</div><div class="stat-value">${w.fasterWhisperInstalled ? '<span style="color:var(--green)">✓ installed</span>' : '<span style="color:var(--text-3)">not installed</span>'}</div></div>
        </div>

        ${bootstrapSection}

        <label class="field-label">Enabled</label>
        <label style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="whisper-enabled" ${w.enabled ? 'checked' : ''} ${w.fasterWhisperInstalled ? '' : 'disabled'}>
          <span style="color:var(--text-1);font-size:13px">Use server Whisper (phone falls back to Android STT on failure)</span>
        </label>

        <label class="field-label">Active model</label>
        <select class="field-input" id="whisper-model" ${w.installedModels.length ? '' : 'disabled'}>
          <option value="">— select —</option>
          ${modelOptions}
        </select>

        <label class="field-label">Device</label>
        <div>${deviceOptions}</div>

        <div style="margin-top:14px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary btn-sm" id="whisper-save">Save &amp; apply</button>
          ${running}
        </div>
        <p class="msg" id="whisper-msg"></p>

        <h3 style="margin-top:18px;margin-bottom:8px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-2)">Installed models</h3>
        ${installed}

        <h3 style="margin-top:14px;margin-bottom:8px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-2)">Install a model</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <select class="field-input" id="whisper-install-model" style="flex:1" ${w.fasterWhisperInstalled ? '' : 'disabled'}>
            ${missingModelsList.length
              ? missingModelsList.map(m => `<option value="${m}">${m}</option>`).join('')
              : '<option value="">all known models installed</option>'}
          </select>
          <button class="btn btn-primary btn-sm" id="whisper-install-btn" ${w.fasterWhisperInstalled && missingModelsList.length ? '' : 'disabled'}>Install</button>
        </div>
        <pre id="whisper-install-log" style="display:none;margin-top:8px;padding:8px;background:var(--bg-2);border-radius:6px;max-height:200px;overflow:auto;font-size:11px;color:var(--text-1);font-family:var(--font-mono)"></pre>
      `;
    }

    function wireWhisperHandlers(w) {
      const bootstrapBtn = document.getElementById('whisper-bootstrap-btn');
      if (bootstrapBtn) {
        bootstrapBtn.onclick = async () => {
          bootstrapBtn.disabled = true;
          const log = document.getElementById('whisper-bootstrap-log');
          log.style.display = 'block';
          log.textContent = 'Starting…\n';
          startWhisperWsStream('whisper:bootstrap-progress', log, () => refreshWhisperPanel());
          try {
            await api('/admin/whisper/bootstrap', { method: 'POST' });
          } catch (e) {
            log.textContent += `ERROR: ${e.message}\n`;
            bootstrapBtn.disabled = false;
          }
        };
      }

      const saveBtn = document.getElementById('whisper-save');
      if (saveBtn) {
        saveBtn.onclick = async () => {
          const enabled = document.getElementById('whisper-enabled').checked;
          const model = document.getElementById('whisper-model').value || null;
          const device = document.querySelector('input[name="whisper-device"]:checked')?.value || 'auto';
          const msg = document.getElementById('whisper-msg');
          msg.textContent = 'Saving…';
          msg.className = 'msg';
          try {
            const res = await api('/admin/whisper/config', { method: 'POST', body: JSON.stringify({ enabled, model, device }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'save failed');
            msg.className = 'msg ok';
            msg.textContent = data.running ? `Running: ${data.config?.model} on ${data.config?.device}` : 'Saved';
            refreshWhisperPanel();
          } catch (e) {
            msg.className = 'msg err'; msg.textContent = e.message;
          }
        };
      }

      const installBtn = document.getElementById('whisper-install-btn');
      if (installBtn) {
        installBtn.onclick = async () => {
          const model = document.getElementById('whisper-install-model').value;
          if (!model) return;
          installBtn.disabled = true;
          const log = document.getElementById('whisper-install-log');
          log.style.display = 'block';
          log.textContent = `Downloading ${model}…\n`;
          startWhisperWsStream('whisper:install-progress', log, () => refreshWhisperPanel());
          try {
            await api('/admin/whisper/install', { method: 'POST', body: JSON.stringify({ model }) });
          } catch (e) {
            log.textContent += `ERROR: ${e.message}\n`;
            installBtn.disabled = false;
          }
        };
      }

      document.querySelectorAll('[data-delete-model]').forEach((btn) => {
        btn.onclick = async () => {
          const name = btn.getAttribute('data-delete-model');
          if (!confirm(`Delete model "${name}"?`)) return;
          try {
            await api(`/admin/whisper/models/${encodeURIComponent(name)}`, { method: 'DELETE' });
            refreshWhisperPanel();
          } catch (e) { alert(e.message); }
        };
      });
    }

    // Subscribe to a WS channel for install/bootstrap progress until __DONE__ or __ERROR__.
    function startWhisperWsStream(channel, logEl, onFinish) {
      try {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${proto}//${location.host}/?token=${encodeURIComponent(token)}`);
        ws.onmessage = (ev) => {
          let msg;
          try { msg = JSON.parse(ev.data); } catch { return; }
          if (msg.type !== channel) return;
          logEl.textContent += msg.line + '\n';
          logEl.scrollTop = logEl.scrollHeight;
          if (msg.line === '__DONE__' || msg.line.startsWith('__ERROR__')) {
            ws.close();
            setTimeout(onFinish, 300);
          }
        };
      } catch (e) {
        logEl.textContent += `(WS stream unavailable: ${e.message})\n`;
      }
    }

    // ── TTS (Kokoro) admin panel ─────────────────────────────
    async function refreshTtsPanel() {
      const body = document.getElementById('tts-body');
      if (!body) return;
      try {
        const res = await api('/admin/tts/status');
        const t = await res.json();
        body.innerHTML = renderTtsBody(t);
        wireTtsHandlers(t);
      } catch (e) {
        body.innerHTML = `<div class="msg err">Failed to load: ${e.message}</div>`;
      }
    }

    function renderTtsBody(t) {
      const running = t.running
        ? `<span style="color:var(--green);font-family:var(--font-mono);font-size:13px">running: voice=${t.currentConfig?.voice} device=${t.currentConfig?.device} speed=${t.currentConfig?.speed}</span>`
        : `<span style="color:var(--text-3);font-family:var(--font-mono);font-size:13px">not running</span>`;

      const voiceOptions = t.knownVoices.map(v =>
        `<option value="${v}"${v === t.voice ? ' selected' : ''}>${v}</option>`
      ).join('');

      const deviceOptions = `
        <label style="margin-right:12px;color:var(--text-1);font-size:13px">
          <input type="radio" name="tts-device" value="auto" ${t.device === 'auto' ? 'checked' : ''}> auto
        </label>
        <label style="margin-right:12px;color:var(--text-1);font-size:13px">
          <input type="radio" name="tts-device" value="cpu" ${t.device === 'cpu' ? 'checked' : ''}> CPU
        </label>
        <label style="color:${t.cudaAvailable ? 'var(--text-1)' : 'var(--text-3)'};font-size:13px">
          <input type="radio" name="tts-device" value="cuda" ${t.device === 'cuda' ? 'checked' : ''} ${t.cudaAvailable ? '' : 'disabled'}>
          GPU (CUDA)${t.cudaAvailable ? '' : ' — not detected'}
        </label>`;

      const bootstrapSection = t.bootstrapped
        ? `<div class="msg ok">kokoro-onnx + model + voices ready</div>`
        : `<div class="stat" style="margin-top:8px">
             <div class="stat-label">Setup required</div>
             <div style="font-size:13px;color:var(--text-1);margin-bottom:8px">
               ${!t.pythonAvailable ? '<span style="color:var(--red)">Python 3 not found on PATH.</span><br>Install python3 on the server host, then reload this page.' : 'Installs kokoro-onnx into a managed venv and downloads ~340MB of model + voice data. Takes a few minutes.'}
             </div>
             <button class="btn btn-primary btn-sm" id="tts-bootstrap-btn" ${t.pythonAvailable ? '' : 'disabled'}>Install TTS dependencies</button>
             <pre id="tts-bootstrap-log" style="display:none;margin-top:8px;padding:8px;background:var(--bg-2);border-radius:6px;max-height:200px;overflow:auto;font-size:11px;color:var(--text-1);font-family:var(--font-mono)"></pre>
           </div>`;

      return `
        <div class="stat-grid" style="margin-bottom:12px">
          <div class="stat"><div class="stat-label">Python 3</div><div class="stat-value">${t.pythonAvailable ? '<span style="color:var(--green)">✓ available</span>' : '<span style="color:var(--red)">✗ not found</span>'}</div></div>
          <div class="stat"><div class="stat-label">CUDA</div><div class="stat-value">${t.cudaAvailable ? '<span style="color:var(--green)">✓ detected</span>' : '<span style="color:var(--text-3)">not detected</span>'}</div></div>
          <div class="stat"><div class="stat-label">kokoro-onnx</div><div class="stat-value">${t.kokoroInstalled ? '<span style="color:var(--green)">✓ installed</span>' : '<span style="color:var(--text-3)">not installed</span>'}</div></div>
          <div class="stat"><div class="stat-label">model + voices</div><div class="stat-value">${t.assetsInstalled ? '<span style="color:var(--green)">✓ downloaded</span>' : '<span style="color:var(--text-3)">missing</span>'}</div></div>
        </div>

        ${bootstrapSection}

        <label class="field-label">Enabled</label>
        <label style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="tts-enabled" ${t.enabled ? 'checked' : ''} ${t.bootstrapped ? '' : 'disabled'}>
          <span style="color:var(--text-1);font-size:13px">Synthesize Claude's spoken output with Kokoro (falls back to Android TTS on failure)</span>
        </label>

        <label class="field-label">Voice</label>
        <select class="field-input" id="tts-voice" ${t.bootstrapped ? '' : 'disabled'}>
          <option value="">— select —</option>
          ${voiceOptions}
        </select>

        <label class="field-label">Device</label>
        <div>${deviceOptions}</div>

        <label class="field-label">Speed: <span id="tts-speed-val">${(t.speed ?? 1.0).toFixed(2)}</span>×</label>
        <input type="range" id="tts-speed" min="0.5" max="2.0" step="0.05" value="${t.speed ?? 1.0}" style="width:100%" ${t.bootstrapped ? '' : 'disabled'}>

        <div style="margin-top:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" id="tts-save">Save &amp; apply</button>
          <button class="btn btn-secondary btn-sm" id="tts-preview" ${t.bootstrapped ? '' : 'disabled'}>Preview</button>
          ${running}
        </div>
        <audio id="tts-preview-audio" style="display:none;margin-top:8px;width:100%" controls></audio>
        <p class="msg" id="tts-msg"></p>
      `;
    }

    function wireTtsHandlers(t) {
      const bootstrapBtn = document.getElementById('tts-bootstrap-btn');
      if (bootstrapBtn) {
        bootstrapBtn.onclick = async () => {
          bootstrapBtn.disabled = true;
          const log = document.getElementById('tts-bootstrap-log');
          log.style.display = 'block';
          log.textContent = 'Starting…\n';
          startWhisperWsStream('tts:bootstrap-progress', log, () => refreshTtsPanel());
          try {
            await api('/admin/tts/bootstrap', { method: 'POST' });
          } catch (e) {
            log.textContent += `ERROR: ${e.message}\n`;
            bootstrapBtn.disabled = false;
          }
        };
      }

      const speedSlider = document.getElementById('tts-speed');
      const speedVal = document.getElementById('tts-speed-val');
      if (speedSlider && speedVal) {
        speedSlider.addEventListener('input', () => {
          speedVal.textContent = parseFloat(speedSlider.value).toFixed(2);
        });
      }

      const saveBtn = document.getElementById('tts-save');
      if (saveBtn) {
        saveBtn.onclick = async () => {
          const enabled = document.getElementById('tts-enabled').checked;
          const voice = document.getElementById('tts-voice').value || null;
          const device = document.querySelector('input[name="tts-device"]:checked')?.value || 'auto';
          const speed = parseFloat(document.getElementById('tts-speed').value);
          const msg = document.getElementById('tts-msg');
          msg.textContent = 'Saving…';
          msg.className = 'msg';
          try {
            const res = await api('/admin/tts/config', { method: 'POST', body: JSON.stringify({ enabled, voice, device, speed }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'save failed');
            msg.className = 'msg ok';
            msg.textContent = data.running ? `Running: ${data.config?.voice} on ${data.config?.device}` : 'Saved';
            refreshTtsPanel();
          } catch (e) {
            msg.className = 'msg err'; msg.textContent = e.message;
          }
        };
      }

      const previewBtn = document.getElementById('tts-preview');
      if (previewBtn) {
        previewBtn.onclick = async () => {
          const msg = document.getElementById('tts-msg');
          const audio = document.getElementById('tts-preview-audio');
          const voice = document.getElementById('tts-voice').value || null;
          const device = document.querySelector('input[name="tts-device"]:checked')?.value || 'auto';
          const speed = parseFloat(document.getElementById('tts-speed').value);
          if (!voice) {
            msg.className = 'msg err'; msg.textContent = 'Pick a voice first';
            return;
          }
          previewBtn.disabled = true;
          msg.className = 'msg'; msg.textContent = 'Synthesizing… (first run may take a few seconds to load the model)';
          try {
            const res = await api('/admin/tts/preview', {
              method: 'POST',
              body: JSON.stringify({
                text: 'Hello. This is a test of the Kokoro neural voice.',
                voice, device, speed,
              }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'preview failed');
            const blob = b64ToBlob(data.audio_b64, data.format === 'wav' ? 'audio/wav' : 'audio/mpeg');
            audio.src = URL.createObjectURL(blob);
            audio.style.display = 'block';
            audio.play();
            msg.className = 'msg ok'; msg.textContent = `Generated in ${data.ms}ms — ${voice}`;
          } catch (e) {
            msg.className = 'msg err'; msg.textContent = e.message;
          } finally {
            previewBtn.disabled = false;
          }
        };
      }
    }

    function b64ToBlob(b64, mime) {
      const bin = atob(b64);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return new Blob([arr], { type: mime });
    }

    function renderSessionRow(s) {
      const hasResume = s.claudeSessionId ? 'Resume' : 'Open';
      const title = s.claudeSessionId
        ? `Resume claude session ${s.claudeSessionId.slice(0, 8)}...`
        : 'Open directory in terminal with claude --resume';
      return `
        <div class="session-row">
          <div class="session-info">
            <div class="session-name">${s.name || 'Unnamed'}</div>
            <div style="font-size:12px;color:var(--text-3);font-family:var(--font-mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.cwd || ''}</div>
          </div>
          <div class="session-right">
            <span class="session-status ${s.status || 'idle'}">${s.status || 'idle'}</span>
            <button class="btn-open" data-session-id="${s.id}" title="${title}">${hasResume}</button>
          </div>
        </div>`;
    }

    function wireOpenButtons() {
      document.querySelectorAll('.btn-open[data-session-id]').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const origText = btn.textContent;
          btn.textContent = '...';
          btn.disabled = true;
          try {
            const res = await api(`/sessions/${btn.dataset.sessionId}/open-terminal`, { method: 'POST' });
            if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || 'Failed'); }
            btn.textContent = 'Opened';
            setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2000);
          } catch (err) {
            btn.textContent = 'Error';
            console.error(err);
            setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2000);
          }
        };
      });
    }

    // ── Init ──
    if (token) {
      // Clean URL
      if (new URLSearchParams(location.search).get('token')) {
        history.replaceState(null, '', location.pathname);
      }
      loadAdmin();
    } else {
      showAuth();
    }
  </script>
</body>
</html>
