<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0c10">
<title>Claude Remote</title>

<!-- xterm.js for raw terminal (vendored locally) -->
<link rel="stylesheet" href="lib/xterm.min.css">
<script src="lib/xterm.min.js"></script>
<script src="lib/addon-fit.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <!-- ── Top Bar ─────────────────────────────────────────────── -->
  <header id="topbar">
    <button id="btn-back" class="topbar-btn hidden" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="topbar-title">
      <span id="topbar-label">Sessions</span>
      <span id="topbar-status" class="topbar-status"></span>
    </div>
    <div class="topbar-actions">
      <button id="btn-voice-mode" class="topbar-btn hidden" title="Voice Mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
      </button>
      <button id="btn-settings" class="topbar-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Views ───────────────────────────────────────────────── -->
  <main id="main"></main>
</div>

<!-- ── Templates ───────────────────────────────────────────── -->

<!-- Dashboard View -->
<template id="tpl-dashboard">
  <div class="dashboard">
    <div class="dash-header">
      <div>
        <h2 class="dash-title">Mission Control</h2>
        <p class="dash-subtitle" id="server-info">Connecting…</p>
      </div>
      <button class="btn-primary" id="btn-new-session">+ New Session</button>
    </div>
    <button class="fab" id="btn-quick-chat">⚡</button>
    <div class="session-grid" id="session-grid">
      <!-- session cards injected here -->
    </div>
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">⌘</div>
      <p>No active sessions</p>
      <p class="dim">Create one to start working with Claude</p>
    </div>
  </div>
</template>

<!-- Session Card -->
<template id="tpl-session-card">
  <div class="session-card" data-id="">
    <div class="card-header">
      <span class="card-status-dot"></span>
      <span class="card-name"></span>
      <span class="card-status-label"></span>
    </div>
    <div class="card-cwd"></div>
    <div class="card-preview"></div>
    <div class="card-footer">
      <span class="card-time"></span>
      <div class="card-actions">
        <button class="card-btn card-btn-open">Open</button>
        <button class="card-btn card-btn-kill">Kill</button>
      </div>
    </div>
  </div>
</template>

<!-- New Session Dialog -->
<template id="tpl-new-session">
  <div class="dialog-overlay">
    <div class="dialog">
      <h3 class="dialog-title">New Session</h3>
      <label class="field-label">Name</label>
      <input type="text" class="field-input" id="new-name" placeholder="My Project" autocomplete="off">
      <label class="field-label">Working Directory</label>
      <div class="dir-picker">
        <input type="text" class="field-input" id="new-cwd" placeholder="~/">
        <button class="btn-browse" id="btn-browse">Browse</button>
      </div>
      <div class="dir-listing hidden" id="dir-listing"></div>
      <div class="dialog-actions">
        <button class="btn-secondary" id="btn-cancel-new">Cancel</button>
        <button class="btn-primary" id="btn-create">Create</button>
      </div>
    </div>
  </div>
</template>

<!-- Session Terminal View -->
<template id="tpl-session-view">
  <div class="session-view">
    <!-- Attention banner -->
    <div class="attention-bar hidden" id="attention-bar">
      <div class="attention-content">
        <span class="attention-icon">⚡</span>
        <span class="attention-text">Claude needs input</span>
      </div>
      <div class="attention-preview" id="attention-msg"></div>
      <button class="attention-dismiss" id="attention-dismiss">✕</button>
    </div>

    <!-- Terminal area -->
    <div class="terminal-container">
      <div id="xterm-container" class="term-panel"></div>
      <button id="jump-bottom-btn" class="jump-bottom-btn hidden" aria-label="Jump to bottom">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>

    <!-- Quick Actions -->
    <div class="quick-bar">
      <button class="qbtn" data-cmd="&#27;[A">↑ Up</button>
      <button class="qbtn" data-cmd="&#27;[B">↓ Down</button>
      <button class="qbtn" data-cmd="&#9;">⇥ Tab</button>
      <button class="qbtn" data-cmd="&#27;[Z">⇧⇥ Shift-Tab</button>
      <button class="qbtn" data-cmd="&#3;">⏹ Ctrl-C</button>
      <button class="qbtn" data-cmd="claude&#13;">▶ Claude</button>
      <button class="qbtn" data-cmd="claude --resume&#13;">▶ Resume</button>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <input type="text" id="cmd-input" placeholder="Type command..." autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="send-btn" id="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>

    <!-- Voice Mode Overlay -->
    <div class="voice-overlay hidden" id="voice-overlay">
      <div class="voice-controls" id="voice-controls">
        <canvas class="voice-waveform" id="voice-waveform"></canvas>
        <button class="voice-talk-btn" id="voice-talk-btn">
          <div class="voice-talk-ring"></div>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
        </button>
      </div>
    </div>
  </div>
</template>

<!-- File Browser View -->
<template id="tpl-file-browser">
  <div class="file-browser">
    <div class="file-path-bar">
      <span class="file-path" id="current-path"></span>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>
</template>

<!-- Settings View -->
<template id="tpl-settings">
  <div class="settings-view">
    <h3 class="settings-title">Settings</h3>

    <div class="setting-group">
      <div class="setting-row">
        <div><span class="setting-name">Input Required</span><br><span class="setting-desc">Notify when Claude needs your response</span></div>
        <div class="toggle-switch on" data-key="alertPrompt"></div>
      </div>
      <div class="setting-row">
        <div><span class="setting-name">Output Finished</span><br><span class="setting-desc">Notify when Claude finishes working</span></div>
        <div class="toggle-switch on" data-key="alertIdle"></div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div><span class="setting-name">Talk Button: Toggle</span><br><span class="setting-desc">Tap to start/stop instead of hold-to-talk</span></div>
        <div class="toggle-switch" data-key="voiceTalkToggle"></div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div><span class="setting-name">Server</span><br><span class="setting-desc" id="setting-server-url">—</span></div>
        <button class="btn-secondary btn-sm" id="btn-disconnect" style="color:var(--red);border-color:var(--red-border);">Disconnect</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div>
          <span class="setting-name">Server</span>
          <span class="version-badge" id="setting-version">—</span>
          <br><span class="setting-desc" id="setting-server-update-status"></span>
        </div>
        <button class="btn-secondary btn-sm" id="btn-check-server-update">Check</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div>
          <span class="setting-name">App</span>
          <span class="version-badge" id="setting-app-version">—</span>
          <br><span class="setting-desc" id="setting-app-update-status"></span>
        </div>
        <button class="btn-secondary btn-sm" id="btn-check-app-update">Check</button>
      </div>
    </div>
  </div>
</template>

<script type="module" src="js/app.js"></script>
</body>
</html>
