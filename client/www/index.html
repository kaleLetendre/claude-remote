<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0c10">
<title>Claude Remote</title>

<!-- xterm.js for raw terminal -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/addons/fit/fit.addon.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <!-- ── Top Bar ─────────────────────────────────────────────── -->
  <header id="topbar">
    <button id="btn-back" class="topbar-btn hidden" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="topbar-title">
      <span id="topbar-label">Sessions</span>
      <span id="topbar-status" class="topbar-status"></span>
    </div>
    <div class="topbar-actions">
      <button id="btn-voice" class="topbar-btn" title="TTS">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.08"/></svg>
      </button>
      <button id="btn-settings" class="topbar-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Views ───────────────────────────────────────────────── -->
  <main id="main"></main>
</div>

<!-- ── Templates ───────────────────────────────────────────── -->

<!-- Dashboard View -->
<template id="tpl-dashboard">
  <div class="dashboard">
    <div class="dash-header">
      <div>
        <h2 class="dash-title">Mission Control</h2>
        <p class="dash-subtitle" id="server-info">Connecting…</p>
      </div>
      <button class="btn-primary" id="btn-new-session">+ New Session</button>
    </div>
    <div class="session-grid" id="session-grid">
      <!-- session cards injected here -->
    </div>
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">⌘</div>
      <p>No active sessions</p>
      <p class="dim">Create one to start working with Claude</p>
    </div>
  </div>
</template>

<!-- Session Card -->
<template id="tpl-session-card">
  <div class="session-card" data-id="">
    <div class="card-header">
      <span class="card-status-dot"></span>
      <span class="card-name"></span>
      <span class="card-status-label"></span>
    </div>
    <div class="card-cwd"></div>
    <div class="card-preview"></div>
    <div class="card-footer">
      <span class="card-time"></span>
      <div class="card-actions">
        <button class="card-btn card-btn-open">Open</button>
        <button class="card-btn card-btn-kill">Kill</button>
      </div>
    </div>
  </div>
</template>

<!-- New Session Dialog -->
<template id="tpl-new-session">
  <div class="dialog-overlay">
    <div class="dialog">
      <h3 class="dialog-title">New Session</h3>
      <label class="field-label">Name</label>
      <input type="text" class="field-input" id="new-name" placeholder="My Project" autocomplete="off">
      <label class="field-label">Working Directory</label>
      <div class="dir-picker">
        <input type="text" class="field-input" id="new-cwd" placeholder="~/">
        <button class="btn-browse" id="btn-browse">Browse</button>
      </div>
      <div class="dir-listing hidden" id="dir-listing"></div>
      <div class="dialog-actions">
        <button class="btn-secondary" id="btn-cancel-new">Cancel</button>
        <button class="btn-primary" id="btn-create">Create</button>
      </div>
    </div>
  </div>
</template>

<!-- Session Terminal View -->
<template id="tpl-session-view">
  <div class="session-view">
    <!-- Attention banner -->
    <div class="attention-bar hidden" id="attention-bar">
      <div class="attention-content">
        <span class="attention-icon">⚡</span>
        <span class="attention-text">Claude needs input</span>
      </div>
      <div class="attention-preview" id="attention-msg"></div>
      <button class="attention-dismiss" id="attention-dismiss">✕</button>
    </div>

    <!-- Terminal area -->
    <div class="terminal-container">
      <div class="view-toggle">
        <button class="toggle-btn active" data-view="raw">Raw</button>
        <button class="toggle-btn" data-view="clean">Clean</button>
      </div>
      <div id="xterm-container" class="term-panel"></div>
      <div id="clean-container" class="term-panel hidden"></div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-bar">
      <button class="qbtn qbtn-green" data-cmd="y\n">✓ Yes</button>
      <button class="qbtn qbtn-red" data-cmd="n\n">✗ No</button>
      <button class="qbtn" data-cmd="\n">↵ Enter</button>
      <button class="qbtn" data-cmd="\x03">⏹ Ctrl-C</button>
      <button class="qbtn" data-cmd="claude\n">▶ Claude</button>
      <button class="qbtn" data-cmd="/compact\n">⊟ Compact</button>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <button class="mic-btn" id="mic-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </button>
      <textarea id="cmd-input" rows="1" placeholder="Command or message…"></textarea>
      <button class="send-btn" id="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</template>

<!-- File Browser View -->
<template id="tpl-file-browser">
  <div class="file-browser">
    <div class="file-path-bar">
      <span class="file-path" id="current-path"></span>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>
</template>

<!-- Settings View -->
<template id="tpl-settings">
  <div class="settings-view">
    <h3 class="settings-title">Settings</h3>

    <div class="setting-group">
      <div class="setting-row">
        <div><span class="setting-name">Text-to-Speech</span><br><span class="setting-desc">Read Claude's output aloud</span></div>
        <div class="toggle-switch" data-key="ttsEnabled"></div>
      </div>
      <div class="setting-row">
        <div><span class="setting-name">Smart TTS</span><br><span class="setting-desc">Only speak Claude's words, skip shell noise</span></div>
        <div class="toggle-switch" data-key="smartTts"></div>
      </div>
      <div class="setting-row">
        <div><span class="setting-name">Attention Alerts</span><br><span class="setting-desc">Vibrate when Claude asks a question</span></div>
        <div class="toggle-switch on" data-key="alertsEnabled"></div>
      </div>
      <div class="setting-row">
        <div><span class="setting-name">Notifications</span><br><span class="setting-desc">Background push notifications</span></div>
        <button class="btn-secondary btn-sm" id="btn-notif-perm">Enable</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div><span class="setting-name">Voice</span></div>
        <select class="field-select" id="sel-voice"></select>
      </div>
      <div class="setting-row">
        <div><span class="setting-name">Speed</span><span class="setting-desc" id="rate-val"> 1.1×</span></div>
        <input type="range" min="0.5" max="2.5" step="0.1" value="1.1" id="rate-range" class="range-input">
      </div>
      <div class="setting-row">
        <div><span class="setting-name">STT Language</span></div>
        <select class="field-select" id="sel-lang">
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="es-ES">Spanish</option>
          <option value="fr-FR">French</option>
          <option value="de-DE">German</option>
          <option value="ja-JP">Japanese</option>
        </select>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div><span class="setting-name">Server</span><br><span class="setting-desc" id="setting-server-url">—</span></div>
        <button class="btn-secondary btn-sm" style="color:var(--red);border-color:var(--red-border);" onclick="disconnectServer()">Disconnect</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div>
          <span class="setting-name">Version</span>
          <span class="version-badge" id="setting-version">—</span>
          <br><span class="setting-desc" id="setting-git-info">—</span>
        </div>
      </div>
      <div class="setting-row">
        <div><span class="setting-name">Check for updates</span><br><span class="setting-desc" id="setting-update-status">Not checked</span></div>
        <button class="btn-secondary btn-sm" id="btn-check-update">Check</button>
      </div>
      <div class="setting-row">
        <div><span class="setting-name">Auto-update</span><br><span class="setting-desc">Check for updates every 5 minutes</span></div>
        <div class="toggle-switch" data-key="autoUpdate"></div>
      </div>
    </div>
  </div>
</template>

<script type="module" src="js/app.js"></script>
</body>
</html>
